<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <link rel="apple-touch-icon" href="https://i.ibb.co/CpnGdnB2/logo-icon2.png">
  <link rel="icon" sizes="192x192" href="https://i.ibb.co/CpnGdnB2/logo-icon2.png">
  <link rel="shortcut icon" href="https://i.ibb.co/CpnGdnB2/logo-icon2.png">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;

    const IconPlus = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconHome = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
    const IconSearch = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
    const IconClock = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
    const IconCheck = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const IconFileText = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
    const IconCalendar = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
    const IconLoader = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;
    const IconEye = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
    const IconEyeOff = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>;
    const IconImage = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
    const IconList = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;
    const IconChevronLeft = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
    const IconChevronRight = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
    const IconTrash = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;

    // Palette
    const OG = '#EC6426';
    const YL = '#F8A91F';
    const CR = '#F9E8D8';
    const BR = '#3D1A00';
    const BM = '#7A3410';
    const WH = '#FFFAF4';

    // ==========================================
    // FluffyCloud
    // ==========================================
    const FluffyCloud = React.memo(({ top, left, right, bottom, scale=1, opacity=0.7, delay='0s', reverse=false }) => (
      <div className="absolute pointer-events-none z-0" style={{ top, left, right, bottom, opacity, transform: `scale(${scale})` }}>
        <div className={reverse ? 'animate-float-reverse' : 'animate-float'} style={{ animationDelay: delay }}>
          <div className="relative w-40 h-16">
            <div className="absolute bottom-0 left-4 w-32 h-10 rounded-full" style={{ backgroundColor: `${CR}bb` }}></div>
            <div className="absolute bottom-2 left-2 w-14 h-14 rounded-full" style={{ backgroundColor: `${CR}bb` }}></div>
            <div className="absolute bottom-5 left-10 w-16 h-16 rounded-full" style={{ backgroundColor: `${CR}bb` }}></div>
            <div className="absolute bottom-1 right-2 w-14 h-14 rounded-full" style={{ backgroundColor: `${CR}bb` }}></div>
          </div>
        </div>
      </div>
    ));

    // ==========================================
    // DynamicBackground
    // ==========================================
    const DynamicBackground = React.memo(() => (
      <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div className="absolute top-[5%] left-[-15%] w-80 h-80 rounded-full blur-[100px] opacity-60 animate-float" style={{ backgroundColor: OG }}></div>
        <div className="absolute bottom-[5%] right-[-15%] w-96 h-96 rounded-full blur-[110px] opacity-50 animate-float-reverse" style={{ backgroundColor: YL }}></div>
        <div className="absolute top-[45%] right-[5%] w-56 h-56 rounded-full blur-[80px] opacity-30 animate-float" style={{ backgroundColor: OG }}></div>
        <FluffyCloud top="8%" left="-5%" scale={1.5} opacity={0.45} delay="0s" />
        <FluffyCloud top="35%" left="-15%" scale={2.5} opacity={0.2} delay="2.5s" />
        <FluffyCloud bottom="20%" left="5%" scale={1.6} opacity={0.45} delay="3s" />
        <FluffyCloud top="50%" right="-5%" scale={1.8} opacity={0.35} delay="1s" reverse={true} />
      </div>
    ));

    // ==========================================
    // Header
    // ==========================================
    const Header = React.memo(({ isAdmin, setIsAdmin, setShowAuthModal, handleImageUpload, profileImage }) => (
      <div className="px-5 pt-6 pb-2 relative z-10">
        <div className="rounded-[32px] p-4 flex items-center justify-between h-20 relative overflow-hidden"
          style={{ background: `linear-gradient(135deg, ${OG} 0%, ${YL} 100%)`, boxShadow: `0 10px 40px ${OG}99` }}>
          <div className="absolute -right-4 -top-4 w-28 h-28 rounded-full opacity-20" style={{ backgroundColor: WH }}></div>
          <div className="absolute -left-4 -bottom-4 w-20 h-20 rounded-full opacity-10" style={{ backgroundColor: BR }}></div>
          <div className="flex flex-col justify-center ml-2 relative z-10">
            <div className="flex items-center gap-1">
              <h1 className="text-l font-black italic tracking-tighter flex">
                {"WantiwaFWPann CMS".split('').map((char, i) => (
                  <span key={i}
                    className={`text-white drop-shadow inline-block animate-text-wave pb-2 ${char === ' ' ? 'w-2.5' : 'pr-[1.5px]'}`}
                    style={{ animationDelay: `${i * 0.1}s`, textShadow: `0 2px 6px ${BR}44` }}>
                    {char}
                  </span>
                ))}
              </h1>
              <button
                onClick={() => isAdmin ? setIsAdmin(false) : setShowAuthModal(true)}
                className="px-1.5 py-0.5 ml-1 rounded-full text-[7px] font-black uppercase tracking-widest border active:scale-95"
                style={{ backgroundColor: `${BR}33`, color: WH, borderColor: `${WH}55` }}>
                {isAdmin ? 'Admin' : 'Guest'}
              </button>
            </div>
            <div className="flex items-center gap-1.5">
              <div className="w-3 h-[1px] bg-white opacity-70"></div>
              <p className="text-[8px] font-black tracking-[0.5em] uppercase text-white opacity-70">Check Q</p>
            </div>
          </div>
          <div
            onClick={isAdmin ? handleImageUpload : undefined}
            className={`w-16 h-16 rounded-[1.25rem] flex items-center justify-center relative overflow-hidden transition-transform ${isAdmin ? 'cursor-pointer hover:scale-105 active:scale-95' : ''}`}
            style={{ backgroundColor: `${BR}44`, borderWidth: '2.5px', borderColor: `${WH}bb` }}>
            {profileImage ? (
              <img src={profileImage} alt="Profile" className="w-full h-full object-cover" />
            ) : (
              <>
                <div className="absolute inset-0 opacity-25" style={{ background: `linear-gradient(to top right, ${BR}, ${OG})` }}></div>
                <span className="text-2xl relative z-10 select-none">🐰</span>
              </>
            )}
          </div>
        </div>
      </div>
    ));

    // ==========================================
    // ProgressFlower
    // ==========================================
    const ProgressFlower = React.memo(({ progress, todayTasksLength, doneToday, triggerFlowerBounce, isBouncing }) => {
      const bloomScale = Math.max(0.2, progress / 100);
      const isFullBloom = progress === 100 && todayTasksLength > 0;
      const petals = [0, 72, 144, 216, 288].map(angle => {
        const rad = (angle * Math.PI) / 180;
        return { cx: 50 + 15 * Math.sin(rad), cy: 50 - 15 * Math.cos(rad), r: 18 };
      });
      return (
        <div
          onClick={triggerFlowerBounce}
          className={`rounded-[28px] p-3 flex flex-col items-center justify-center h-full relative overflow-hidden transition-all duration-300 cursor-pointer ${isBouncing ? 'scale-95' : 'hover:scale-[1.02]'}`}
          style={{ background: `linear-gradient(160deg, ${OG} 0%, #C84E18 100%)`, boxShadow: `0 8px 28px ${OG}88` }}>
          <div className="absolute top-0 right-0 w-20 h-20 rounded-full blur-xl opacity-25" style={{ backgroundColor: YL }}></div>
          <div className="absolute top-2 left-3 text-[8px] font-black uppercase tracking-tighter text-white opacity-75">ความสำเร็จ</div>
          <div className="relative w-full h-20 flex items-center justify-center mt-2">
            {progress > 0 && (
              <div className="absolute inset-0 pointer-events-none">
                <div className="absolute top-1/2 left-1/4 w-1.5 h-1.5 bg-white rounded-full animate-float-particle-1 opacity-60"></div>
                <div className="absolute top-2/3 right-1/4 w-2 h-2 rounded-full animate-float-particle-2 opacity-60" style={{ backgroundColor: CR }}></div>
                <div className="absolute top-1/3 right-1/3 w-1.5 h-1.5 bg-white rounded-full animate-float-particle-3 opacity-60"></div>
              </div>
            )}
            <svg viewBox="0 0 100 100" className="w-20 h-20 overflow-visible">
              <g transform="translate(50, 50)">
                <g className="animate-breathe">
                  <g transform={`scale(${bloomScale})`} className="transition-transform duration-1000">
                    <g transform="translate(-50, -50)">
                      {petals.map((p, i) => (
                        <circle key={i} cx={p.cx} cy={p.cy} r={p.r} fill={CR} opacity="0.9" className="transition-all duration-700"/>
                      ))}
                      <circle cx="50" cy="50" r="14" fill={WH} className="transition-all duration-700" />
                      {isFullBloom && (
                        <g transform="translate(50, 50)">
                          <path d="M -5 -1 Q -3 -3 -1 -1" fill="none" stroke={BR} strokeWidth="1.2" strokeLinecap="round" />
                          <path d="M 1 -1 Q 3 -3 5 -1" fill="none" stroke={BR} strokeWidth="1.2" strokeLinecap="round" />
                          <path d="M -1.5 2 Q 0 4 1.5 2" fill="none" stroke={BR} strokeWidth="1.2" strokeLinecap="round" />
                          <ellipse cx="-6" cy="1" rx="1.5" ry="1" fill={OG} opacity="0.6"/>
                          <ellipse cx="6" cy="1" rx="1.5" ry="1" fill={OG} opacity="0.6"/>
                        </g>
                      )}
                    </g>
                  </g>
                </g>
              </g>
            </svg>
          </div>
          <div className="mt-1 flex items-center gap-1 px-2 py-0.5 rounded-full z-10" style={{ backgroundColor: `${BR}44` }}>
            <span className="text-xs font-black text-white">{progress}%</span>
            <div className="w-1 h-1 rounded-full bg-white opacity-50"></div>
            <span className="text-[8px] font-bold text-white opacity-65 uppercase">{doneToday} / {todayTasksLength} งาน</span>
          </div>
        </div>
      );
    });

    // ==========================================
    // CompactStats
    // ==========================================
    const CompactStats = React.memo(({ isAdmin, selectedNextDate, nextQueueDate, handleSetManualDate, waitingCount }) => (
      <div className="rounded-[28px] h-full flex overflow-hidden" style={{ boxShadow: `0 8px 28px ${OG}66` }}>
        <div
          className={`flex-1 flex flex-col justify-center items-center p-2 relative overflow-hidden ${isAdmin ? 'cursor-pointer' : ''}`}
          style={{ background: `linear-gradient(160deg, ${OG} 0%, #C84E18 100%)` }}>
          {isAdmin && (
            <input
              type="date"
              className="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10"
              value={selectedNextDate || nextQueueDate}
              onChange={(e) => handleSetManualDate(e.target.value)} />
          )}
          <div className="absolute top-0 right-0 w-10 h-10 rounded-full blur-md opacity-20" style={{ backgroundColor: YL }}></div>
          <div
            className="absolute top-2 left-1/2 -translate-x-1/2 px-2 py-0.5 rounded-md text-[7px] font-black uppercase tracking-wider whitespace-nowrap"
            style={{ color: WH, backgroundColor: `${BR}44`, borderWidth: '1px', borderColor: `${WH}33` }}>
            NEXT QUEUE
          </div>
          <div className="flex flex-col items-center mt-1 relative z-0 pointer-events-none">
            <span className="text-3xl font-black leading-none tracking-tighter text-white">
              {new Date(nextQueueDate).getDate()}
            </span>
            <span className="text-[8px] font-black uppercase mt-0.5 text-white opacity-75">
              {new Date(nextQueueDate).toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}
            </span>
          </div>
          {isAdmin && selectedNextDate && (
            <button
              onClick={(e) => { e.preventDefault(); e.stopPropagation(); handleSetManualDate(''); }}
              className="absolute bottom-1.5 left-1/2 -translate-x-1/2 z-20 px-2.5 py-0.5 rounded-md text-[7px] font-black active:scale-90 transition-all"
              style={{ color: WH, backgroundColor: `${BR}55`, borderWidth: '1px', borderColor: `${WH}44` }}>
              AUTO
            </button>
          )}
        </div>
        <div className="w-[2px]" style={{ backgroundColor: `${BR}22` }}></div>
        <div
          className="flex-1 flex flex-col justify-center items-center p-2 relative"
          style={{ background: `linear-gradient(160deg, ${YL} 0%, #E09318 100%)` }}>
          <div className="absolute top-0 left-0 w-10 h-10 rounded-full blur-md opacity-20" style={{ backgroundColor: OG }}></div>
          <div
            className="absolute top-2 left-1/2 -translate-x-1/2 px-2.5 py-0.5 rounded-md text-[7px] font-black uppercase tracking-wider whitespace-nowrap z-10"
            style={{ color: BR, backgroundColor: `${BR}22`, borderWidth: '1px', borderColor: `${BR}22` }}>
            จำนวนคิวก่อนหน้า
          </div>
          <div className="relative mt-5 flex flex-col items-center">
            <div className="relative">
              <div className="absolute inset-0 blur-lg rounded-full opacity-60 scale-125" style={{ backgroundColor: OG }}></div>
              <div
                className="w-11 h-11 rounded-full flex flex-col items-center justify-center relative z-10"
                style={{ backgroundColor: `${BR}22`, borderWidth: '2px', borderColor: `${BR}44` }}>
                <span className="text-xl font-black leading-none" style={{ color: BR }}>{waitingCount}</span>
              </div>
            </div>
            <span className="text-[8px] font-black uppercase mt-1.5 relative z-10" style={{ color: BR, opacity: 0.65 }}>คิว</span>
          </div>
        </div>
      </div>
    ));

    // ==========================================
    // TaskCard — FIXED
    // ==========================================
    const TaskCard = React.memo(({ task, isAdmin, onEdit, onToggleDoing, onToggleStatus }) => {
      const isDone = task.status === 'done';
      const isDoing = task.status === 'doing';
      return (
        <div
          onClick={() => isAdmin && onEdit(task)}
          className={`relative mb-2 rounded-[22px] p-3 transition-all group ${isAdmin ? 'active:scale-[0.97] cursor-pointer' : ''}`}
          style={{
            background: isDone
              ? `linear-gradient(135deg, ${OG} 0%, #C84E18 100%)`
              : isDoing
              ? `linear-gradient(135deg, ${YL} 0%, ${OG} 100%)`
              : `linear-gradient(135deg, ${YL} 0%, #F0C050 100%)`,
            borderWidth: '1.5px',
            borderColor: isDoing ? OG : isDone ? '#B84010' : YL,
            opacity: isDone ? 0.88 : 1,
            boxShadow: isDoing ? `0 4px 16px ${OG}55` : isDone ? `0 4px 12px ${OG}44` : `0 3px 10px ${YL}88`,
          }}
        >
          {/* Floating emoji particles when doing */}
          {isDoing && (
            <div className="absolute inset-0 pointer-events-none z-0">
              <img
                src="https://i.ibb.co/vCKsTLV0/Emoji.png"
                alt=""
                className="absolute -bottom-2 -left-3 w-5 h-5 object-contain animate-float-particle-1 drop-shadow-sm"
              />
              <img
                src="https://i.ibb.co/vCKsTLV0/Emoji.png"
                alt=""
                className="absolute top-[30%] -left-4 w-4 h-4 object-contain animate-float-particle-3 drop-shadow-sm"
                style={{ animationDelay: '1.5s' }}
              />
              <img
                src="https://i.ibb.co/vCKsTLV0/Emoji.png"
                alt=""
                className="absolute -bottom-2 -right-3 w-5 h-5 object-contain animate-float-particle-2 drop-shadow-sm"
                style={{ animationDelay: '0.5s' }}
              />
              <img
                src="https://i.ibb.co/vCKsTLV0/Emoji.png"
                alt=""
                className="absolute top-[30%] -right-4 w-4 h-4 object-contain animate-float-particle-1 drop-shadow-sm"
                style={{ animationDelay: '1.2s' }}
              />
            </div>
          )}

          {/* Channel color bar */}
          <div
            className="absolute left-2 top-3 bottom-3 w-1 rounded-full z-10"
            style={{
              backgroundColor:
                task.channel === 'LINE' ? '#4CAF50' :
                task.channel === 'FB' || task.channel === 'FACEBOOK' ? '#1877F2' :
                task.channel === 'IG' ? '#E1306C' : BR
            }}
          ></div>

          <div className="pl-3 pr-1 relative z-10">
            <div className="flex justify-between items-start mb-1">
              <div className="flex items-center gap-2 min-w-0">
                <span className="font-bold text-base truncate" style={{ color: isDone ? WH : BR }}>{task.client}</span>
                <span
                  className="text-[7px] px-1.5 py-0.5 rounded-md font-black uppercase"
                  style={{ backgroundColor: `${BR}22`, color: isDone ? WH : BR, borderWidth: '1px', borderColor: `${BR}22` }}>
                  {task.channel}
                </span>
                {task.priority === 'urgent' && (
                  <span
                    className="text-[9px] font-bold animate-pulse px-2 py-0.5 rounded-full"
                    style={{ color: isDone ? WH : BR, backgroundColor: `${BR}22` }}>
                    🔥 ด่วน
                  </span>
                )}
              </div>
              <div
                className="flex items-center gap-1 text-[9px] font-black px-2.5 py-0.5 rounded-lg"
                style={{ color: isDone ? WH : BR, backgroundColor: `${BR}22`, borderWidth: '1px', borderColor: `${BR}22` }}>
                <IconCalendar size={11} />
                {new Date(task.deadline).toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: '2-digit' })}
              </div>
            </div>

            <div className="flex justify-between items-end mt-1">
              <div className="flex-1 min-w-0 mr-4 flex flex-col">
                <span
                  className="text-[10px] font-bold truncate"
                  style={{ color: isDone ? `${WH}88` : `${BR}88`, textDecoration: isDone ? 'line-through' : 'none' }}>
                  {task.type}
                </span>
                {task.details && (
                  <span
                    className="text-[11px] font-medium truncate mt-0.5"
                    style={{ color: isDone ? `${WH}bb` : `${BR}bb` }}>
                    {task.details}
                  </span>
                )}
              </div>

              {isAdmin ? (
                <div className="flex gap-1.5">
                  <button
                    onClick={(e) => onToggleDoing(e, task.id)}
                    className="relative w-[28px] h-[28px] rounded-[8px] flex items-center justify-center transition-all active:scale-90"
                    style={{
                      color: isDoing ? OG : `${BR}55`,
                      backgroundColor: isDoing ? WH : `${BR}22`,
                      borderWidth: '2px',
                      borderColor: isDoing ? WH : `${BR}33`
                    }}>
                    <div className={`${isDoing ? 'animate-spin-slow' : ''} flex items-center justify-center`}>
                      <IconLoader size={14} />
                    </div>
                  </button>
                  <button
                    onClick={(e) => onToggleStatus(e, task.id)}
                    className="relative w-[28px] h-[28px] rounded-[8px] flex items-center justify-center transition-all active:scale-90"
                    style={{
                      color: isDone ? OG : `${BR}55`,
                      backgroundColor: isDone ? WH : `${BR}22`,
                      borderWidth: '2px',
                      borderColor: isDone ? WH : `${BR}33`
                    }}>
                    <IconCheck size={16} />
                  </button>
                </div>
              ) : (
                <div className="flex items-center">
                  {isDoing && (
                    <span
                      className="text-[10px] font-bold flex items-center gap-1 px-2 py-1 rounded-md"
                      style={{ color: BR, backgroundColor: `${BR}22`, borderWidth: '1px', borderColor: `${BR}22` }}>
                      <IconLoader size={10} className="animate-spin-slow" /> กำลังทำ
                    </span>
                  )}
                  {isDone && (
                    <span
                      className="text-[10px] font-bold flex items-center gap-1 px-2 py-1 rounded-md"
                      style={{ color: WH, backgroundColor: `${BR}33`, borderWidth: '1px', borderColor: `${WH}33` }}>
                      <IconCheck size={10} /> เสร็จแล้ว
                    </span>
                  )}
                  {!isDoing && !isDone && (
                    <span
                      className="text-[10px] font-bold flex items-center gap-1 px-2 py-1 rounded-md"
                      style={{ color: BR, backgroundColor: `${BR}22`, borderWidth: '1px', borderColor: `${BR}22` }}>
                      <IconClock size={10} /> รอคิว
                    </span>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    });

    // ==========================================
    // CalendarView
    // ==========================================
    const CalendarView = React.memo(({ currentMonth, setCurrentMonth, selectedDate, setSelectedDate, today, tasks }) => {
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();
      const days = [];
      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let i = 1; i <= daysInMonth; i++) days.push(i);
      const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      return (
        <div
          className="rounded-[32px] p-5 mb-5 animate-fadeIn"
          style={{ background: `linear-gradient(160deg, ${YL} 0%, #F0C050 100%)`, boxShadow: `0 10px 36px ${YL}99`, borderWidth: '3px', borderColor: OG }}>
          <div className="flex justify-between items-center mb-4 px-2">
            <button onClick={() => setCurrentMonth(new Date(year, month-1, 1))} className="p-1.5 rounded-full" style={{ backgroundColor: `${BR}22`, color: BR }}>
              <IconChevronLeft size={20}/>
            </button>
            <h3 className="font-black text-[16px] tracking-widest" style={{ color: BR }}>{monthNames[month]} {year}</h3>
            <button onClick={() => setCurrentMonth(new Date(year, month+1, 1))} className="p-1.5 rounded-full" style={{ backgroundColor: `${BR}22`, color: BR }}>
              <IconChevronRight size={20}/>
            </button>
          </div>
          <div className="grid grid-cols-7 gap-1 text-center mb-3">
            {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => (
              <div key={d} className="text-[9px] font-black uppercase" style={{ color: BR, opacity: 0.55 }}>{d}</div>
            ))}
          </div>
          <div className="grid grid-cols-7 gap-y-3 gap-x-1 text-center">
            {days.map((day, index) => {
              if (!day) return <div key={`empty-${index}`} className="h-10"></div>;
              const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
              const isSelected = selectedDate === dateStr;
              const isToday = today === dateStr;
              const hasTasks = tasks.some(t => t.deadline === dateStr);
              return (
                <div key={dateStr} className="flex justify-center items-center h-10">
                  <div
                    onClick={() => setSelectedDate(dateStr)}
                    className="relative w-10 h-10 flex flex-col items-center justify-center cursor-pointer transition-all rounded-full"
                    style={{
                      backgroundColor: isSelected ? OG : isToday ? `${OG}33` : 'transparent',
                      color: isSelected ? WH : BR,
                      fontWeight: (isSelected || isToday) ? '900' : '700',
                      transform: isSelected ? 'scale(1.05)' : 'scale(1)',
                      borderWidth: (isToday && !isSelected) ? '2px' : '0',
                      borderColor: OG
                    }}>
                    <span className="text-[13px] z-10 leading-none">{day}</span>
                    {hasTasks && (
                      <div className="absolute bottom-1 w-1.5 h-1.5 rounded-full" style={{ backgroundColor: isSelected ? WH : OG }}></div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    });

    // ==========================================
    // MAIN APP
    // ==========================================
    function App() {
      const [tasks, setTasks] = useState([]);
      const [taskTypes, setTaskTypes] = useState(['Logo', 'Banner', 'Artwork']);
      const [channels, setChannels] = useState(['LINE', 'FB', 'IG']);
      const [isLoading, setIsLoading] = useState(true);
      const [isSaving, setIsSaving] = useState(false);
      const [view, setView] = useState('dashboard');
      const [isCalendarView, setIsCalendarView] = useState(false);
      const [currentMonth, setCurrentMonth] = useState(new Date());
      const [selectedDate, setSelectedDate] = useState(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      });
      const [showModal, setShowModal] = useState(false);
      const [editingTask, setEditingTask] = useState(null);
      const [taskToDelete, setTaskToDelete] = useState(null);
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [showImageModal, setShowImageModal] = useState(false);
      const [showBannerModal, setShowBannerModal] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');
      const [filterType, setFilterType] = useState('all');
      const [isAdmin, setIsAdmin] = useState(false);
      const [password, setPassword] = useState('');
      const [authError, setAuthError] = useState(false);
      const [isVerifyingAuth, setIsVerifyingAuth] = useState(false);
      const [profileImage, setProfileImage] = useState(null);
      const [tempImageUrl, setTempImageUrl] = useState('');
      const [bannerImage, setBannerImage] = useState(null);
      const [tempBannerUrl, setTempBannerUrl] = useState('');
      const [isBannerVisible, setIsBannerVisible] = useState(true);
      const [selectedNextDate, setSelectedNextDate] = useState('');
      const [isBouncing, setIsBouncing] = useState(false);

      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzaEGVvyfDBbv24n_7fWQgpmrTWmRzZTD9yqFdhRmw76FCfwrN44xhhsBzWY3sHWp7kOA/exec";

      const fetchAPI = async (payload) => {
        try {
          const res = await fetch(WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          return await res.json();
        } catch(e) { throw e; }
      };

      useEffect(() => {
        document.title = "WantiwaFWPann CMS";
        fetch(WEB_APP_URL + "?action=getInitialData")
          .then(r => r.json())
          .then(response => {
            if (response.status === 'success') {
              setTasks(response.data.tasks || []);
              if (response.data.taskTypes?.length > 0) setTaskTypes(response.data.taskTypes);
              if (response.data.channels?.length > 0) setChannels(response.data.channels);
              if (response.data.profileImage) setProfileImage(response.data.profileImage);
              if (response.data.bannerImage) setBannerImage(response.data.bannerImage);
              if (response.data.bannerVisible !== undefined) setIsBannerVisible(response.data.bannerVisible);
              if (response.data.lockedNextDate) setSelectedNextDate(response.data.lockedNextDate);
            }
            setIsLoading(false);
          })
          .catch(() => setIsLoading(false));
      }, []);

      const handleAdminLogin = (e) => {
        e.preventDefault();
        setIsVerifyingAuth(true);
        setAuthError(false);
        fetchAPI({ action: 'verifyAdminPassword', inputPassword: password })
          .then(res => {
            setIsVerifyingAuth(false);
            if (res.isValid) { setIsAdmin(true); setShowAuthModal(false); setPassword(''); }
            else setAuthError(true);
          })
          .catch(() => { setIsVerifyingAuth(false); setAuthError(true); });
      };

      const handleSetManualDate = useCallback((dateVal) => {
        setSelectedNextDate(dateVal);
        fetchAPI({ action: 'saveLockedNextDate', dateStr: dateVal });
      }, []);

      const today = useMemo(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      }, []);

      const todayTasks = useMemo(() => tasks.filter(t => t.deadline === today), [tasks, today]);
      const doneToday = useMemo(() => todayTasks.filter(t => t.status === 'done').length, [todayTasks]);
      const progress = todayTasks.length === 0 ? 0 : Math.round((doneToday / todayTasks.length) * 100);

      const nextQueueDate = useMemo(() => {
        if (selectedNextDate) return selectedNextDate;
        let d = new Date();
        for (let i = 0; i < 365; i++) {
          const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
          if (!tasks.some(t => t.deadline === ds)) return ds;
          d.setDate(d.getDate() + 1);
        }
        return today;
      }, [tasks, selectedNextDate]);

      const waitingCount = useMemo(() => tasks.filter(t => t.status !== 'done').length, [tasks]);

      const toggleStatus = useCallback((e, id) => {
        e.stopPropagation();
        setTasks(prev => prev.map(t => {
          if (t.id !== id) return t;
          const s = t.status === 'done' ? 'todo' : 'done';
          fetchAPI({ action: 'updateTaskStatus', taskId: id, newStatus: s });
          return { ...t, status: s };
        }));
      }, []);

      const toggleDoing = useCallback((e, id) => {
        e.stopPropagation();
        setTasks(prev => prev.map(t => {
          if (t.id !== id) return t;
          const s = t.status === 'doing' ? 'todo' : 'doing';
          fetchAPI({ action: 'updateTaskStatus', taskId: id, newStatus: s });
          return { ...t, status: s };
        }));
      }, []);

      const handleEditTask = useCallback((task) => { setEditingTask(task); setShowModal(true); }, []);

      const handleSaveTask = (e) => {
        e.preventDefault();
        setIsSaving(true);
        const f = new FormData(e.target);
        fetchAPI({
          action: 'saveOrUpdateTask',
          task: {
            id: editingTask?.id || null,
            title: '',
            client: f.get('client'),
            type: f.get('type'),
            channel: f.get('channel'),
            priority: f.get('priority') ? 'urgent' : 'normal',
            deadline: f.get('deadline'),
            details: f.get('details')
          }
        })
          .then(res => {
            if (res.status === 'success') {
              setTasks(prev => editingTask
                ? prev.map(t => t.id === res.task.id ? res.task : t)
                : [...prev, res.task]
              );
            }
            setIsSaving(false);
            setShowModal(false);
            setEditingTask(null);
          })
          .catch(() => setIsSaving(false));
      };

      const executeDeleteTask = () => {
        if (!taskToDelete) return;
        setIsSaving(true);
        fetchAPI({ action: 'deleteTask', taskId: taskToDelete })
          .then(() => {
            setTasks(prev => prev.filter(t => t.id !== taskToDelete));
            setIsSaving(false);
            setShowModal(false);
            setEditingTask(null);
            setTaskToDelete(null);
          })
          .catch(() => setIsSaving(false));
      };

      const toggleBannerVisibility = (v) => {
        setIsBannerVisible(v);
        fetchAPI({ action: 'saveBannerVisibility', isVisible: v });
      };

      const triggerFlowerBounce = useCallback(() => {
        setIsBouncing(true);
        setTimeout(() => setIsBouncing(false), 500);
      }, []);

      const handleImageUpload = useCallback(() => setShowImageModal(true), []);

      const filteredAllTasks = useMemo(() => tasks.filter(t => {
        const ms = t.type.toLowerCase().includes(searchQuery.toLowerCase()) || t.client.toLowerCase().includes(searchQuery.toLowerCase());
        const mf = filterType === 'all' || (filterType === 'pending' && t.status !== 'done') || (filterType === 'done' && t.status === 'done');
        return ms && mf;
      }), [tasks, searchQuery, filterType]);

      const displayedTasks = isCalendarView ? filteredAllTasks.filter(t => t.deadline === selectedDate) : filteredAllTasks;

      const MS = { backgroundColor: CR, borderWidth: '2px', borderColor: OG };
      const IS = { backgroundColor: WH, borderWidth: '1px', borderColor: `${OG}55`, color: BR };
      const BP = { background: `linear-gradient(to right, ${OG}, ${YL})` };

      if (isLoading) return (
        <div className="min-h-screen flex flex-col items-center justify-center relative overflow-hidden" style={{ backgroundColor: CR }}>
          <DynamicBackground />
          <div className="flex flex-col items-center z-10 animate-breathe">
            <div className="flex items-center gap-1.5 px-6 py-2.5 rounded-full"
              style={{ background: `linear-gradient(to right, ${OG}, ${YL})`, boxShadow: `0 4px 20px ${OG}66` }}>
              <p className="text-[12px] font-black tracking-widest text-white">กำลังโหลดข้อมูล</p>
              <div className="flex gap-1 pt-1 ml-1">
                {[0, 0.15, 0.3].map((d, i) => (
                  <span key={i} className="w-1.5 h-1.5 rounded-full bg-white animate-bounce" style={{ animationDelay: `${d}s` }}></span>
                ))}
              </div>
            </div>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen font-sans relative" style={{ backgroundColor: CR, color: BR }}>
          <DynamicBackground />
          <div className="max-w-md mx-auto min-h-screen relative pb-28">

            <Header
              isAdmin={isAdmin}
              setIsAdmin={setIsAdmin}
              setShowAuthModal={setShowAuthModal}
              handleImageUpload={handleImageUpload}
              profileImage={profileImage} />

            {/* Banner */}
            <div className="px-5 relative z-10 mb-4">
              {bannerImage && isBannerVisible && (
                <div
                  className="relative group w-full h-32 rounded-[24px] overflow-hidden"
                  style={{ borderWidth: '3px', borderColor: OG, boxShadow: `0 4px 16px ${OG}44` }}>
                  <img src={bannerImage} alt="Shop Banner" className="w-full h-full object-cover" />
                  <div className="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                    {isAdmin && (
                      <button onClick={() => setShowBannerModal(true)} className="p-1.5 rounded-full shadow-sm" style={{ backgroundColor: `${CR}dd`, color: BR }}>
                        <IconImage size={16} />
                      </button>
                    )}
                    {isAdmin && (
                      <button onClick={() => toggleBannerVisibility(false)} className="p-1.5 rounded-full shadow-sm" style={{ backgroundColor: `${CR}dd`, color: BR }}>
                        <IconEyeOff size={16} />
                      </button>
                    )}
                  </div>
                </div>
              )}
              {bannerImage && !isBannerVisible && isAdmin && (
                <div className="flex justify-end mb-1">
                  <button
                    onClick={() => toggleBannerVisibility(true)}
                    className="text-[10px] font-bold flex items-center gap-1 px-3 py-1.5 rounded-full shadow-sm"
                    style={{ color: BR, backgroundColor: `${YL}cc`, borderWidth: '1px', borderColor: OG }}>
                    <IconEye size={12} /> แสดงแบนเนอร์
                  </button>
                </div>
              )}
              {!bannerImage && isAdmin && (
                <div
                  onClick={() => setShowBannerModal(true)}
                  className="w-full h-16 rounded-[24px] border-[3px] border-dashed flex items-center justify-center cursor-pointer hover:opacity-80"
                  style={{ borderColor: OG, backgroundColor: `${YL}44` }}>
                  <span className="text-[11px] font-bold flex items-center gap-2" style={{ color: BM }}>
                    <IconPlus size={16}/> เพิ่มรูปแบนเนอร์ร้าน
                  </span>
                </div>
              )}
            </div>

            {/* Main Content */}
            <div className="px-5 relative z-10">
              {view === 'dashboard' ? (
                <div className="animate-fadeIn">
                  <div className="flex gap-3 h-28 mb-4">
                    <div className="flex-[1.6]">
                      <CompactStats
                        isAdmin={isAdmin}
                        selectedNextDate={selectedNextDate}
                        nextQueueDate={nextQueueDate}
                        handleSetManualDate={handleSetManualDate}
                        waitingCount={waitingCount} />
                    </div>
                    <div className="flex-1">
                      <ProgressFlower
                        progress={progress}
                        todayTasksLength={todayTasks.length}
                        doneToday={doneToday}
                        triggerFlowerBounce={triggerFlowerBounce}
                        isBouncing={isBouncing} />
                    </div>
                  </div>

                  <div className="flex items-center gap-3 mb-2.5">
                    <div className="px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest text-white"
                      style={{ background: `linear-gradient(to right, ${OG}, ${YL})` }}>
                      Today's Task
                    </div>
                    <div className="h-[2px] flex-1 rounded-full" style={{ background: `linear-gradient(to right, ${YL}99, transparent)` }}></div>
                  </div>

                  <div className="space-y-1">
                    {todayTasks.length > 0 ? todayTasks.map(t => (
                      <TaskCard key={t.id} task={t} isAdmin={isAdmin} onEdit={handleEditTask} onToggleDoing={toggleDoing} onToggleStatus={toggleStatus} />
                    )) : (
                      <div className="text-center py-10 rounded-[28px] border-2 border-dashed" style={{ backgroundColor: `${YL}33`, borderColor: `${OG}66` }}>
                        <p className="text-[9px] font-bold uppercase tracking-widest" style={{ color: BM, opacity: 0.6 }}>Sky is clear ✨</p>
                      </div>
                    )}
                  </div>
                </div>
              ) : (
                <div className="animate-fadeIn">
                  <div className="relative mb-4">
                    <div className="absolute left-4 top-1/2 -translate-y-1/2" style={{ color: BM, opacity: 0.6 }}>
                      <IconSearch size={16} />
                    </div>
                    <input
                      type="text"
                      placeholder="ค้นหาคิวงาน..."
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className="w-full rounded-[22px] py-3 pl-10 pr-4 outline-none text-xs"
                      style={{ backgroundColor: WH, borderWidth: '2px', borderColor: YL, color: BR, boxShadow: `0 4px 16px ${YL}66` }} />
                  </div>

                  <div className="flex gap-1.5 mb-3 p-1.5 rounded-full"
                    style={{ background: `linear-gradient(to right, ${OG}, #C84E18)`, boxShadow: `0 4px 16px ${OG}66` }}>
                    {[['all','ทั้งหมด'],['pending','ยังไม่ได้เริ่ม'],['done','เสร็จแล้ว']].map(([key, label]) => (
                      <button key={key} onClick={() => setFilterType(key)}
                        className="flex-1 text-[9px] font-black py-2 rounded-full transition-all"
                        style={{ color: filterType === key ? OG : `${WH}cc`, backgroundColor: filterType === key ? WH : 'transparent' }}>
                        {label}
                      </button>
                    ))}
                  </div>

                  <div className="flex justify-end mb-4 pr-1">
                    <button
                      onClick={() => { const n = !isCalendarView; setIsCalendarView(n); if(n) setFilterType('all'); }}
                      className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest active:scale-95"
                      style={{ color: BR, background: `linear-gradient(to right, ${YL}, #F0C050)`, borderWidth: '2px', borderColor: OG, boxShadow: `0 4px 14px ${YL}99` }}>
                      {isCalendarView ? <><IconList size={14} /> รูปแบบรายการ</> : <><IconCalendar size={14} /> รูปแบบปฏิทิน</>}
                    </button>
                  </div>

                  {isCalendarView && (
                    <CalendarView
                      currentMonth={currentMonth}
                      setCurrentMonth={setCurrentMonth}
                      selectedDate={selectedDate}
                      setSelectedDate={setSelectedDate}
                      today={today}
                      tasks={tasks} />
                  )}

                  <div className="space-y-1">
                    {displayedTasks.length > 0 ? displayedTasks.map(t => (
                      <TaskCard key={t.id} task={t} isAdmin={isAdmin} onEdit={handleEditTask} onToggleDoing={toggleDoing} onToggleStatus={toggleStatus} />
                    )) : (
                      <div className="text-center py-10 rounded-[28px] border-[4px] border-dashed mt-4" style={{ backgroundColor: `${YL}33`, borderColor: OG }}>
                        <p className="text-[10px] font-black uppercase tracking-widest" style={{ color: BM, opacity: 0.6 }}>
                          {isCalendarView ? "วันนี้คิวว่าง ✨" : "No records found ✨"}
                        </p>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>

            {/* Bottom Nav */}
            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-[210px] z-50">
              <div
                className="rounded-full h-14 flex items-center justify-between px-6 relative"
                style={{ background: `linear-gradient(135deg, ${OG} 0%, #C84E18 100%)`, boxShadow: `0 8px 32px ${OG}99`, borderWidth: '2px', borderColor: `${YL}88` }}>
                <button
                  onClick={() => setView('dashboard')}
                  className={`p-1 transition-all ${view === 'dashboard' ? 'scale-110' : 'opacity-50'}`}
                  style={{ color: WH }}>
                  <IconHome size={22} />
                </button>
                <div className="w-8"></div>
                <button
                  onClick={() => setView('all')}
                  className={`p-1 transition-all ${view === 'all' ? 'scale-110' : 'opacity-50'}`}
                  style={{ color: WH }}>
                  <IconFileText size={22} />
                </button>
                {isAdmin && (
                  <div className="absolute left-1/2 -translate-x-1/2 -top-6">
                    <button
                      onClick={() => { setEditingTask(null); setShowModal(true); }}
                      className="w-14 h-14 rounded-full flex items-center justify-center active:scale-90 transition-transform"
                      style={{ background: `linear-gradient(to bottom right, ${YL}, ${OG})`, borderWidth: '4px', borderColor: WH, boxShadow: `0 8px 24px ${OG}aa`, color: WH }}>
                      <IconPlus size={24} />
                    </button>
                  </div>
                )}
              </div>
            </div>

            {/* MODAL: Add/Edit */}
            {showModal && (
              <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/20 backdrop-blur-[2px] animate-fadeIn">
                <form onSubmit={handleSaveTask} className="w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp" style={MS}>
                  <h3 className="text-sm font-black mb-4 text-center" style={{ color: BR }}>
                    {editingTask ? 'แก้ไขคิวงาน ✨' : 'เพิ่มคิวใหม่ ✨'}
                  </h3>
                  <div className="space-y-2 relative">
                    {isSaving && (
                      <div className="absolute inset-0 z-50 flex flex-col items-center justify-center rounded-2xl" style={{ backgroundColor: `${CR}ee` }}>
                        <IconLoader size={32} className="animate-spin-slow" style={{ color: OG }} />
                        <span className="text-[10px] font-black mt-2" style={{ color: BM }}>กำลังบันทึก...</span>
                      </div>
                    )}
                    <div className="flex justify-end mb-1">
                      <label className="flex items-center cursor-pointer gap-2 px-3 py-1.5 rounded-full" style={{ backgroundColor: YL, borderWidth: '1px', borderColor: OG }}>
                        <span className="text-[10px] font-bold" style={{ color: BR }}>คิวด่วน 🔥</span>
                        <div className="relative">
                          <input type="checkbox" name="priority" value="urgent" defaultChecked={editingTask?.priority === 'urgent'} className="sr-only peer" />
                          <div className="w-8 h-4 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-[#EC6426]"></div>
                        </div>
                      </label>
                    </div>
                    <input name="client" required defaultValue={editingTask?.client || ''} className="w-full p-3.5 rounded-2xl outline-none text-[11px] shadow-sm" style={IS} placeholder="ชื่อลูกค้า" />
                    <div className="flex flex-col gap-2">
                      <input list="taskTypesList" name="type" required defaultValue={editingTask?.type || ''} className="w-full p-3.5 rounded-2xl font-black text-[10px] outline-none shadow-sm" style={IS} placeholder="ประเภทงาน" />
                      <datalist id="taskTypesList">{taskTypes.map(t => <option key={t} value={t} />)}</datalist>
                      <input list="channelsList" name="channel" required defaultValue={editingTask?.channel || ''} className="w-full p-3.5 rounded-2xl font-black text-[10px] outline-none shadow-sm" style={IS} placeholder="ช่องทาง" />
                      <datalist id="channelsList">{channels.map(c => <option key={c} value={c} />)}</datalist>
                    </div>
                    <textarea name="details" rows="2" defaultValue={editingTask?.details || ''} className="w-full p-3.5 rounded-2xl outline-none text-[11px] shadow-sm resize-none" style={IS} placeholder="รายละเอียดเพิ่มเติม (ถ้ามี)..."></textarea>
                    <div className="flex items-center justify-between p-1.5 pl-4 rounded-2xl mt-1" style={{ backgroundColor: `${YL}55`, borderWidth: '1px', borderColor: `${OG}66` }}>
                      <div className="flex items-center gap-1.5 text-[10px] uppercase tracking-wider font-black" style={{ color: OG }}>
                        <IconCalendar size={12} /><span>Deadline</span>
                      </div>
                      <input name="deadline" type="date" required defaultValue={editingTask?.deadline || nextQueueDate}
                        className="w-32 p-2.5 rounded-xl outline-none text-[10px] font-black cursor-pointer"
                        style={{ backgroundColor: WH, borderWidth: '1px', borderColor: OG, color: OG }} />
                    </div>
                    <div className="flex items-center gap-2 mt-3">
                      <button type="submit" className="flex-1 py-3.5 rounded-2xl font-black text-xs text-white shadow-lg active:scale-95 transition-all" style={BP}>
                        บันทึกคิวงาน
                      </button>
                      {editingTask && (
                        <button type="button" onClick={() => setTaskToDelete(editingTask.id)}
                          className="w-12 h-[44px] flex items-center justify-center rounded-2xl bg-red-50 text-red-400 border border-red-100 active:scale-95 shadow-sm">
                          <IconTrash size={18} />
                        </button>
                      )}
                    </div>
                    <button type="button" onClick={() => { setShowModal(false); setEditingTask(null); }}
                      className="w-full text-[9px] font-bold mt-2 uppercase tracking-widest"
                      style={{ color: `${BM}66` }}>
                      Close
                    </button>
                  </div>
                </form>
              </div>
            )}

            {/* MODAL: Login */}
            {showAuthModal && (
              <div className="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-black/20 backdrop-blur-[2px] animate-fadeIn">
                <form onSubmit={handleAdminLogin} className="w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp" style={MS}>
                  <h3 className="text-sm font-black mb-4 text-center" style={{ color: BR }}>เข้าสู่ระบบ Admin</h3>
                  <div className="space-y-2">
                    <input type="password" required value={password}
                      onChange={(e) => { setPassword(e.target.value); setAuthError(false); }}
                      className="w-full p-3.5 rounded-2xl outline-none text-[11px] shadow-sm text-center tracking-widest"
                      style={{ ...IS, borderColor: authError ? '#f87171' : `${OG}55` }}
                      placeholder="ใส่รหัสผ่าน" disabled={isVerifyingAuth} />
                    {authError && <p className="text-red-400 text-[9px] text-center font-bold">รหัสผ่านไม่ถูกต้อง!</p>}
                    <button type="submit" disabled={isVerifyingAuth}
                      className="w-full h-11 rounded-2xl font-black text-xs mt-3 text-white shadow-lg flex items-center justify-center active:scale-95 disabled:opacity-70"
                      style={BP}>
                      {isVerifyingAuth ? <IconLoader size={16} className="animate-spin-slow" /> : 'Login'}
                    </button>
                    <button type="button" onClick={() => { setShowAuthModal(false); setAuthError(false); setPassword(''); }}
                      className="w-full text-[9px] font-bold mt-1 uppercase tracking-widest"
                      style={{ color: `${BM}66` }} disabled={isVerifyingAuth}>
                      Close
                    </button>
                  </div>
                </form>
              </div>
            )}

            {/* MODAL: Profile Image */}
            {showImageModal && (
              <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 bg-black/20 backdrop-blur-[2px] animate-fadeIn">
                <form
                  onSubmit={(e) => {
                    e.preventDefault();
                    if (tempImageUrl) {
                      let u = tempImageUrl;
                      const m = u.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || u.match(/id=([a-zA-Z0-9_-]+)/) || u.match(/\/d\/([a-zA-Z0-9_-]+)/);
                      if (m?.[1]) u = `https://lh3.googleusercontent.com/d/${m[1]}`;
                      setProfileImage(u);
                      fetchAPI({ action: 'saveProfileImage', imageUrl: u });
                    }
                    setShowImageModal(false);
                    setTempImageUrl('');
                  }}
                  className="w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp" style={MS}>
                  <h3 className="text-sm font-black mb-4 text-center" style={{ color: BR }}>เปลี่ยนรูปโปรไฟล์ 🐰</h3>
                  <div className="space-y-2">
                    <input type="url" required value={tempImageUrl} onChange={(e) => setTempImageUrl(e.target.value)}
                      className="w-full p-3.5 rounded-2xl outline-none text-[11px] shadow-sm text-center" style={IS}
                      placeholder="วางลิงก์รูปภาพ Google Drive..." />
                    <button type="submit" className="w-full py-3.5 rounded-2xl font-black text-xs mt-3 text-white shadow-lg active:scale-95" style={BP}>Save Image</button>
                    <button type="button" onClick={() => { setShowImageModal(false); setTempImageUrl(''); }}
                      className="w-full text-[9px] font-bold mt-1 uppercase tracking-widest" style={{ color: `${BM}66` }}>Close</button>
                  </div>
                </form>
              </div>
            )}

            {/* MODAL: Banner */}
            {showBannerModal && (
              <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 bg-black/20 backdrop-blur-[2px] animate-fadeIn">
                <form
                  onSubmit={(e) => {
                    e.preventDefault();
                    if (tempBannerUrl) {
                      let u = tempBannerUrl;
                      const m = u.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || u.match(/id=([a-zA-Z0-9_-]+)/) || u.match(/\/d\/([a-zA-Z0-9_-]+)/);
                      if (m?.[1]) u = `https://lh3.googleusercontent.com/d/${m[1]}`;
                      setBannerImage(u);
                      toggleBannerVisibility(true);
                      fetchAPI({ action: 'saveBannerImage', imageUrl: u });
                    }
                    setShowBannerModal(false);
                    setTempBannerUrl('');
                  }}
                  className="w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp" style={MS}>
                  <h3 className="text-sm font-black mb-4 text-center" style={{ color: BR }}>เปลี่ยนแบนเนอร์</h3>
                  <div className="space-y-2">
                    <input type="url" required value={tempBannerUrl} onChange={(e) => setTempBannerUrl(e.target.value)}
                      className="w-full p-3.5 rounded-2xl outline-none text-[11px] shadow-sm text-center" style={IS}
                      placeholder="วางลิงก์รูปภาพ Google Drive..." />
                    <button type="submit" className="w-full py-3.5 rounded-2xl font-black text-xs mt-3 text-white shadow-lg active:scale-95" style={BP}>Save Banner</button>
                    <button type="button" onClick={() => { setShowBannerModal(false); setTempBannerUrl(''); }}
                      className="w-full text-[9px] font-bold mt-1 uppercase tracking-widest" style={{ color: `${BM}66` }}>Close</button>
                  </div>
                </form>
              </div>
            )}

            {/* MODAL: Delete Confirm */}
            {taskToDelete && (
              <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/30 backdrop-blur-[2px] animate-fadeIn">
                <div className="w-full max-w-[260px] rounded-[30px] p-6 shadow-2xl animate-slideUp text-center" style={MS}>
                  <div className="w-14 h-14 rounded-full bg-red-50 text-red-400 flex items-center justify-center mx-auto mb-3 border border-red-100">
                    <IconTrash size={26} />
                  </div>
                  <h3 className="text-[14px] font-black mb-1" style={{ color: BR }}>ยืนยันการลบ?</h3>
                  <p className="text-[10px] font-bold mb-5" style={{ color: BM }}>
                    คุณต้องการลบคิวงานนี้ใช่หรือไม่<br/>(ไม่สามารถกู้คืนได้)
                  </p>
                  <div className="flex gap-2">
                    <button onClick={() => setTaskToDelete(null)}
                      className="flex-1 py-3 rounded-2xl font-black text-[10px] bg-gray-100 text-gray-500 hover:bg-gray-200 active:scale-95 shadow-sm">
                      ยกเลิก
                    </button>
                    <button onClick={executeDeleteTask}
                      className="flex-1 py-3 rounded-2xl font-black text-[10px] text-white bg-red-400 hover:bg-red-500 active:scale-95 shadow-sm">
                      ลบข้อมูล
                    </button>
                  </div>
                </div>
              </div>
            )}

          </div>

          <style>{`
            @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(25px, -15px); } }
            @keyframes float-reverse { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-25px, 15px); } }
            @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
            @keyframes float-particle-1 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-20px); opacity: 0; } }
            @keyframes float-particle-2 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-15px) translateX(5px); opacity: 0; } }
            @keyframes float-particle-3 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-25px) translateX(-5px); opacity: 0; } }
            @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            @keyframes text-wave { 0%, 20%, 100% { transform: translateY(0px); } 10% { transform: translateY(-5px); } }
            @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
            .animate-text-wave { animation: text-wave 4s ease-in-out infinite; }
            .animate-breathe { animation: breathe 4s ease-in-out infinite; transform-origin: center; }
            .animate-float-particle-1 { animation: float-particle-1 3s ease-out infinite; }
            .animate-float-particle-2 { animation: float-particle-2 4s ease-out infinite 1s; }
            .animate-float-particle-3 { animation: float-particle-3 3.5s ease-out infinite 0.5s; }
            .animate-float { animation: float 15s ease-in-out infinite; }
            .animate-float-reverse { animation: float-reverse 18s ease-in-out infinite; }
            .animate-slideUp { animation: slideUp 0.3s ease-out; }
            .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
            .animate-spin-slow { animation: spin-slow 4s linear infinite; }
          `}</style>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
